<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moviment Academia Messenger Header</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        background: #0f172a;
      }

      .scanline {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, #ef4444, transparent);
        animation: scan 3s infinite linear;
      }

      @keyframes scan {
        from {
          transform: translateX(-100%);
        }

        to {
          transform: translateX(100%);
        }
      }
    </style>
  </head>

  <body class="p-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div
        class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/20"
      >
        <span class="text-white font-black text-sm">P</span>
      </div>
      <div>
        <h3
          class="text-white font-bold text-xs uppercase tracking-tighter leading-none"
        >
          Moviment Academia Messenger
        </h3>
        <span
          class="text-[11px] text-emerald-500 font-bold uppercase tracking-wider"
          >Quantum HUD Active</span
        >
      </div>
    </div>
    <div class="scanline"></div>
    <script>
      // TRUQUE DO ÍMÃ: Refoca a cada 500ms para ficar "sempre no topo"
      setInterval(() => {
        if (!window.opener || window.opener.closed) window.close();
      }, 1000);
      window.onclick = () => window.focus();
    </script>
  </body>
</html>
