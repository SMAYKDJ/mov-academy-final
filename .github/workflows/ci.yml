name: Moviment Academy CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run Data Pipeline (Ingest & Train)
        run: |
          python backend/data/ingest_churn.py
          python backend/train_churn_model.py
        env:
          RECEBIMENTOS_PATH: backend/data/recebimentos.csv
          DEVEDORES_PATH: backend/data/devedores.csv
          FREQ_TREINO_PATH: backend/data/frequencia_treino.csv

      - name: Run Backend Tests
        run: |
          pytest tests/api tests/data

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npm run test:ui
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
