<!doctype html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Moviment Academia | Controle de Acesso Inteligente</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="supabase.js"></script>
    <script src="playfitness-api.js"></script>
    <script>
      PlayFitnessAPI.boot();
    </script>

    <style>
      :root {
        --primary: #ff3131;
        --primary-rgb: 255, 49, 49;
        --background: #080808;
        --surface: #0c0c0c;
        --surface-container: #121212;
        --error: #ff4d4d;
      }
      body {
        font-family: "Lexend", sans-serif;
        background-color: var(--background);
        color: #ffffff;
        overflow: hidden;
      }
      .font-headline {
        font-family: "Lexend", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }

      .scanner-ring {
        border: 2px solid rgba(255, 49, 49, 0.2);
        border-radius: 50%;
      }
      .scanner-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        opacity: 0.5;
        animation: scan 3s ease-in-out infinite;
      }

      @keyframes scan {
        0%,
        100% {
          top: 0;
          opacity: 0;
        }
        50% {
          top: 100%;
          opacity: 1;
        }
      }

      .status-card {
        background: rgba(18, 18, 18, 0.6);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.8),
          inset 0 0 1px rgba(255, 255, 255, 0.1);
      }
      .access-granted {
        border-color: #10b981 !important;
        color: #10b981 !important;
        box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
      }
      .access-denied {
        border-color: var(--primary) !important;
        color: var(--primary) !important;
        box-shadow: 0 0 50px rgba(255, 49, 49, 0.2);
      }

      video {
        transform: scaleX(-1);
      } /* Mirror effect */
      .premium-glow {
        box-shadow: 0 0 80px rgba(255, 49, 49, 0.1);
      }
    </style>
  </head>
  <body
    class="bg-background text-white flex flex-col items-center justify-center h-screen px-6"
  >
    <!-- Digital Header -->
    <div class="absolute top-10 flex flex-col items-center">
      <h1
        class="text-4xl font-black italic tracking-tighter uppercase text-white"
      >
        Moviment<span class="text-primary"> Academia</span>
      </h1>
      <p
        class="text-[9px] tracking-[0.5em] text-zinc-500 uppercase font-bold mt-1"
      >
        Biometric Access Protocol
        <span class="text-primary/60 ml-2">Intelligence Ops</span>
      </p>
    </div>

    <!-- Scanner Main Unit -->
    <div class="relative w-80 h-80 md:w-96 md:h-96">
      <!-- Outer Decorations -->
      <div
        class="absolute -inset-10 border border-white/5 rounded-full animate-[spin_30s_linear_infinite]"
      ></div>
      <div
        class="absolute -inset-6 border border-primary/20 rounded-full animate-[spin_15s_linear_reverse_infinite]"
      ></div>

      <!-- Video Container -->
      <div
        class="absolute inset-0 rounded-full overflow-hidden border-4 border-white/5 bg-zinc-950 premium-glow"
      >
        <video
          id="webcam"
          autoplay
          muted
          title="Câmera de Reconhecimento Facial"
          class="w-full h-full object-cover grayscale opacity-80"
        ></video>
        <canvas
          id="overlay"
          class="absolute inset-0 pointer-events-none"
        ></canvas>
        <div class="scanner-line"></div>
      </div>

      <!-- Corner Details -->
      <div
        class="absolute top-0 left-0 w-10 h-10 border-t-2 border-l-2 border-primary/40 rounded-tl-[2.5rem]"
      ></div>
      <div
        class="absolute top-0 right-0 w-10 h-10 border-t-2 border-r-2 border-primary/40 rounded-tr-[2.5rem]"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-10 h-10 border-b-2 border-l-2 border-primary/40 rounded-bl-[2.5rem]"
      ></div>
      <div
        class="absolute bottom-0 right-0 w-10 h-10 border-b-2 border-r-2 border-primary/40 rounded-br-[2.5rem]"
      ></div>

      <!-- Instruction Tooltip -->
      <div
        id="instructionHUD"
        class="absolute -bottom-20 left-1/2 -translate-x-1/2 bg-primary/10 backdrop-blur-md border border-primary/20 px-8 py-4 rounded-full text-[10px] font-black uppercase tracking-widest text-primary animate-pulse transition-all duration-300 opacity-100 flex items-center gap-3 min-w-[280px] justify-center shadow-lg"
      >
        <span class="material-symbols-outlined text-[18px]"
          >identity_platform</span
        >
        <span id="instructionText">Aguardando Identificação...</span>
      </div>
    </div>

    <!-- Info Display Area -->
    <div
      id="statusArea"
      class="mt-24 w-full max-w-sm status-card rounded-[3rem] p-10 text-center transition-all duration-700 opacity-0 transform translate-y-12"
    >
      <h2
        id="studentName"
        class="text-3xl font-black italic uppercase font-headline tracking-tighter mb-2 text-white"
      >
        Processando...
      </h2>
      <p
        id="studentStatus"
        class="text-[10px] uppercase tracking-[0.4em] font-black text-primary/80 mb-6"
      >
        Security Checkpoint
      </p>
      <div
        id="statusIcon"
        class="w-20 h-20 rounded-full mx-auto flex items-center justify-center bg-white/5 border border-white/5 shadow-inner"
      >
        <span class="material-symbols-outlined text-4xl">hourglass_empty</span>
      </div>
      <p
        id="welcomeMsg"
        class="mt-6 text-[12px] text-zinc-400 font-medium leading-relaxed"
      ></p>
    </div>

    <!-- Bottom Controls -->
    <div class="absolute bottom-10 flex gap-6">
      <button
        onclick="location.reload()"
        class="w-14 h-14 flex items-center justify-center bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/5 group"
      >
        <span
          class="material-symbols-outlined text-[20px] text-zinc-500 group-hover:text-white transition-colors"
          >refresh</span
        >
      </button>
      <button
        onclick="location.href = 'dashboard.html'"
        class="px-10 py-4 bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/5 font-black text-[10px] uppercase tracking-widest text-zinc-500 hover:text-white"
      >
        Encerrar Terminal
      </button>
    </div>

    <!-- Audio Effects -->
    <audio
      id="audioSuccess"
      src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"
    ></audio>
    <audio
      id="audioError"
      src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
    ></audio>

    <script>
      let faceMatcher = null;
      let labeledDescriptors = [];
      let modelLoaded = false;
      let lastId = null;
      let detectionInterval = null;
      let livenessStatus = "waiting"; // 'waiting', 'verifying', 'confirmed'
      let blinkCounter = 0;

      async function startRealtimeSync() {
        console.log("🚀 Motor de Sincronismo Moviment Academia Ativado!");

        // Escuta inserções na tabela 'logs_acesso' enviadas pelo Python
        window.supabaseClient
          .channel("public:logs_acesso")
          .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: "logs_acesso" },
            async (payload) => {
              const { aluno_id, status_acesso } = payload.new;

              if (aluno_id) {
                const { data: aluno } = await window.supabaseClient
                  .from("alunos")
                  .select("*")
                  .eq("id", aluno_id)
                  .single();

                if (aluno) {
                  const isSucesso =
                    status_acesso === "sucesso" || status_acesso === "liberado";
                  updateUI(
                    aluno.nome_completo,
                    isSucesso ? "Acesso Liberado" : "Acesso Negado",
                    isSucesso ? "verified" : "close",
                    isSucesso
                      ? `Bem-vindo, ${aluno.nome_completo.split(" ")[0]}! Identificado via YOLO+PCA.`
                      : "Pendência Detectada.",
                    isSucesso ? "granted" : "denied",
                  );

                  if (isSucesso) document.getElementById("audioSuccess").play();
                  else document.getElementById("audioError").play();

                  setTimeout(() => {
                    document.getElementById("statusArea").style.opacity = "0";
                    document.getElementById("instructionText").innerText =
                      "Aguardando Rosto...";
                  }, 5000);
                }
              }
            },
          )
          .subscribe();
      }

      function safeInit() {
        if (typeof faceapi !== "undefined" && window.supabaseClient) {
          console.log("🚀 Módulos detectados! Iniciando catraca...");
          initScanner();
          startRealtimeSync();
        } else {
          // Se ainda não carregou, tenta novamente em 100ms
          setTimeout(safeInit, 100);
        }
      }

      document.addEventListener("DOMContentLoaded", safeInit);

      async function initScanner() {
        try {
          // Usando JSDelivr Mirror (muito mais rápido que raw.githubusercontent)
          const MODEL_URL =
            "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
          updateUI(
            "Sistema",
            "Carregando IA",
            "psychology",
            "Sincronizando modelos de alta performance...",
            "waiting",
          );

          // Usando TinyFaceDetector: Muito mais leve e rápido para navegadores
          await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
          await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
          await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

          modelLoaded = true;
          await loadStudentsFromSupabase();
          await startVideo();
          startDetection();
        } catch (err) {
          console.error("Erro no scanner:", err);
          updateUI(
            "Erro",
            "Falha de Sistema",
            "error",
            "Não foi possível carregar a IA.",
            "denied",
          );
        }
      }

      async function loadStudentsFromSupabase() {
        const { data, error } = await window.supabaseClient
          .from("alunos")
          .select("id, nome_completo, biometria_facial, situacao_financeira")
          .not("biometria_facial", "is", null);

        if (data && data.length > 0) {
          labeledDescriptors = data.map((aluno) => {
            const descriptor = new Float32Array(aluno.biometria_facial);
            return new faceapi.LabeledFaceDescriptors(aluno.id.toString(), [
              descriptor,
            ]);
          });
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
          console.log(`${data.length} alunos biometricos carregados.`);
        }
      }

      async function startVideo() {
        const video = document.getElementById("webcam");
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
      }

      async function startDetection() {
        const video = document.getElementById("webcam");
        const instrHUD = document.getElementById("instructionHUD");
        const instrText = document.getElementById("instructionText");

        // Configuração Ultra-Rápida: inputSize 128 é o segredo para ser "ao vivo"
        const tinyOptions = new faceapi.TinyFaceDetectorOptions({
          inputSize: 128,
          scoreThreshold: 0.5,
        });

        async function onPlay() {
          if (!modelLoaded || !faceMatcher || video.paused || video.ended) {
            return requestAnimationFrame(onPlay);
          }

          const detections = await faceapi
            .detectSingleFace(video, tinyOptions)
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (detections) {
            const box = detections.detection.box;
            const faceSize = (box.width + box.height) / 2;

            if (faceSize < 160) {
              instrText.innerText = "Aproxime seu rosto";
              instrHUD.style.borderColor = "rgba(239, 68, 68, 0.4)";
            } else if (faceSize > 350) {
              instrText.innerText = "Afaste-se um pouco";
              instrHUD.style.borderColor = "rgba(239, 68, 68, 0.4)";
            } else if (livenessStatus === "verifying") {
              instrText.innerText = "Pisque agora para entrar";
              instrHUD.style.borderColor = "#fbbf24";
              instrHUD.classList.add("bg-yellow-500/10");
            } else {
              instrText.innerText = "Identificando...";
              instrHUD.style.borderColor = "rgba(16, 185, 129, 0.4)";
              instrHUD.classList.remove("bg-yellow-500/10");
            }

            const bestMatch = faceMatcher.findBestMatch(detections.descriptor);

            if (livenessStatus === "waiting") {
              processMatch(bestMatch, detections.landmarks);
            } else if (livenessStatus === "verifying") {
              checkBlink(detections.landmarks);
            }
          } else {
            instrText.innerText = "Posicione seu rosto";
            instrHUD.style.borderColor = "rgba(255, 255, 255, 0.1)";
            instrHUD.classList.remove("bg-yellow-500/10");
          }

          // Próximo quadro assim que o processamento terminar
          requestAnimationFrame(onPlay);
        }

        onPlay();
      }

      // Função para detectar piscar de olhos (EAR - Eye Aspect Ratio simplificado)
      function checkBlink(landmarks) {
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();

        // Distância vertical vs horizontal (simplificada)
        const leftDist =
          Math.abs(leftEye[1].y - leftEye[5].y) /
          Math.abs(leftEye[0].x - leftEye[3].x);
        const rightDist =
          Math.abs(rightEye[1].y - rightEye[5].y) /
          Math.abs(rightEye[0].x - rightEye[3].x);

        // Se a proporção for muito baixa, o olho está fechado (piscou)
        if (leftDist < 0.22 && rightDist < 0.22) {
          blinkCounter++;
          if (blinkCounter >= 2) {
            // Exigir que feche por 2 frames
            livenessStatus = "confirmed";
            handleAccessGranted();
          }
        }
      }

      let pendingStudent = null;

      async function processMatch(match, landmarks) {
        if (match.label === "unknown") {
          updateUI(
            "Desconhecido",
            "Acesso Negado",
            "close",
            "Este rosto não consta na base.",
            "denied",
          );
          logAcesso(null, "tentativa_negada", "Rosto desconhecido capturado.");
          return;
        }

        if (lastId === match.label) return;

        const { data, error } = await window.supabaseClient
          .from("alunos")
          .select("*")
          .eq("id", match.label)
          .single();

        if (data) {
          pendingStudent = data;
          if (data.situacao_financeira === "em dia") {
            livenessStatus = "verifying";
            blinkCounter = 0;
            updateUI(
              data.nome_completo,
              "Prova de Vida",
              "visibility",
              "Pisque os olhos para confirmar!",
              "waiting",
            );
          } else {
            lastId = data.id;
            updateUI(
              data.nome_completo,
              "Acesso Bloqueado",
              "warning",
              "Pendência financeira. Favor ir à recepção.",
              "denied",
            );
            logAcesso(data.id, "bloqueado", "Pendência financeira");
            document.getElementById("audioError").play();

            setTimeout(() => {
              lastId = null;
            }, 5000);
          }
        }
      }

      async function handleAccessGranted() {
        const data = pendingStudent;
        lastId = data.id;
        livenessStatus = "confirmed";

        // MENSAGEM VIP / MENSAGEM DE PLANO (UX do tutorial)
        let personalizedMsg = "Bem-vindo! Bom treino.";
        if (data.plano?.toLowerCase().includes("vip")) {
          personalizedMsg = `🏆 VIP DETECTADO: Excelente treino, ${data.nome_completo.split(" ")[0]}!`;
        } else if (data.status === "Em Risco") {
          personalizedMsg =
            "⚠️ Notamos sua frequência baixa. Que bom te ver de volta!";
        }

        updateUI(
          data.nome_completo,
          "Acesso Liberado",
          "verified",
          personalizedMsg,
          "granted",
        );
        document.getElementById("audioSuccess").play();

        logAcesso(data.id, "liberado", null);
        console.log(">>> [COMANDO] LIBERAR DISPOSITIVO FISICO");

        setTimeout(() => {
          lastId = null;
          livenessStatus = "waiting";
          pendingStudent = null;
          document.getElementById("statusArea").style.opacity = "0";
        }, 4000);
      }

      async function logAcesso(alunoId, status, motivo) {
        try {
          await window.supabaseClient.from("logs_acesso").insert({
            aluno_id: alunoId,
            status_acesso: status,
            motivo_bloqueio: motivo,
            metodo: "pca_legacy_ufc",
          });
        } catch (e) {
          console.error("Erro ao registrar log:", e);
        }
      }

      function updateUI(name, status, icon, msg, type) {
        const statusArea = document.getElementById("statusArea");
        document.getElementById("studentName").textContent = name;
        document.getElementById("studentStatus").textContent = status;
        document.getElementById("welcomeMsg").textContent = msg;
        document.getElementById("statusIcon").innerHTML =
          `<span class="material-symbols-outlined text-3xl">${icon}</span>`;

        statusArea.classList.remove("access-granted", "access-denied");
        if (type === "granted") statusArea.classList.add("access-granted");
        if (type === "denied") statusArea.classList.add("access-denied");

        statusArea.style.opacity = "1";
        statusArea.style.transform = "translateY(0)";
      }
    </script>
  </body>
</html>
