<!doctype html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Moviment Academia | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="playfitness-api.js"></script>
    <script>
      PlayFitnessAPI.boot();
    </script>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF3131",
              "primary-dark": "#D70000",
              background: "#080808",
              "surface-container-highest": "#121212",
            },
            fontFamily: {
              headline: ["Lexend"],
              body: ["Plus Jakarta Sans"],
            },
            borderRadius: { lg: "2rem", xl: "3rem" },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #080808;
        color: #ffffff;
      }
      .font-headline {
        font-family: "Lexend", sans-serif;
      }
      .glass-card {
        background: rgba(18, 18, 18, 0.6);
        -webkit-backdrop-filter: blur(24px);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.8),
          inset 0 0 1px rgba(255, 255, 255, 0.1);
      }
      .glow-soft {
        box-shadow: 0 0 80px rgba(255, 49, 49, 0.05);
      }
      .premium-text-gradient {
        background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>

  <body
    class="bg-background flex items-center justify-center min-h-screen p-6 overflow-hidden relative"
  >
    <!-- Background Decor -->
    <div
      class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px] -z-10"
    ></div>
    <div
      class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-primary/3 rounded-full blur-[120px] -z-10"
    ></div>

    <div class="w-full max-w-md space-y-10 relative">
      <div class="text-center space-y-3">
        <h1
          class="text-[4.5rem] font-black text-primary tracking-tighter italic leading-none font-headline"
        >
          Moviment Academia
        </h1>
        <p
          class="font-black text-[0.65rem] uppercase tracking-[0.5em] text-white/30 italic"
        >
          Inteligência Estratégica & Ops
        </p>
      </div>

      <div class="glass-card p-12 rounded-[2.5rem] glow-soft space-y-10">
        <div class="space-y-8">
          <div class="space-y-3">
            <label
              for="username"
              class="text-[10px] font-black uppercase tracking-widest text-primary/60 ml-2 italic"
              >Acesso Restrito</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-xl"
                >person</span
              >
              <input
                id="username"
                title="Acesso Restrito"
                placeholder="Nome de usuário"
                type="text"
                value="SMAYK TR"
                readonly
                class="w-full bg-surface-container-highest border border-white/5 rounded-2xl py-5 pl-14 pr-6 text-sm font-bold uppercase italic text-white/40 cursor-not-allowed"
              />
            </div>
          </div>
          <div class="space-y-3">
            <label
              for="password"
              class="text-[10px] font-black uppercase tracking-widest text-primary/60 ml-2 italic"
              >Chave de Segurança</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-xl"
                >lock</span
              >
              <input
                id="password"
                title="Chave de Segurança"
                placeholder="Senha"
                type="password"
                value="••••••••"
                readonly
                class="w-full bg-surface-container-highest border border-white/5 rounded-2xl py-5 pl-14 pr-6 text-sm font-bold italic text-white/40 cursor-not-allowed"
              />
            </div>
          </div>
        </div>

        <button
          onclick="location.href = 'dashboard.html'"
          class="w-full bg-primary text-white py-6 rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all shadow-2xl shadow-primary/20 flex items-center justify-center gap-3"
        >
          <span>Inicializar Sistema</span>
          <span class="material-symbols-outlined text-[18px]">bolt</span>
        </button>
      </div>

      <div class="text-center space-y-2">
        <p
          class="text-[9px] font-black text-white/10 uppercase tracking-[0.3em]"
        >
          © 2026 Moviment Academia Quantum Analysis • ADS Estácio
        </p>
        <div
          class="flex justify-center gap-4 text-[8px] font-bold text-white/5 uppercase tracking-widest"
        >
          <span>Versão 4.0.0</span>
          <span>•</span>
          <span>Security Level Red</span>
        </div>
      </div>
    </div>
  </body>
</html>
