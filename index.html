<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login Premium Dark Analytics | GymIntel</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "primary-dark": "#1d4ed8",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                        "surface-dark": "#1a202e",
                        "border-dark": "#2d3648",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col overflow-hidden">
    <!-- Background Pattern -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-20">
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20"></div>
        <div class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] bg-primary/30 rounded-full blur-[128px]"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[128px]">
        </div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-1 items-center justify-center p-4 sm:p-8">
        <div
            class="w-full max-w-md bg-white dark:bg-surface-dark rounded-2xl shadow-2xl border border-slate-200 dark:border-border-dark overflow-hidden">
            <!-- Logo Section -->
            <div class="flex flex-col items-center pt-10 pb-6 px-8">
                <div class="size-12 mb-4 text-primary bg-primary/10 rounded-xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-3xl">analytics</span>
                </div>
                <h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">GymData Analytics</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enterprise Edition</p>
            </div>

            <!-- Welcome Text -->
            <div class="px-8 text-center mb-8">
                <h1 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight mb-2">Bem-vindo de volta</h1>
                <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                    Acesse o futuro da sua gestão baseada em dados
                </p>
            </div>

            <!-- Login Form -->
            <form class="px-8 flex flex-col gap-5">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="email">Email
                        Profissional</label>
                    <div class="relative flex items-center">
                        <input
                            class="w-full h-12 rounded-lg bg-slate-50 dark:bg-[#151a25] border border-slate-200 dark:border-border-dark text-slate-900 dark:text-white text-sm px-4 pl-11 focus:ring-2 focus:ring-primary/50 focus:border-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none"
                            id="email" placeholder="seu@empresa.com" type="email" />
                        <span
                            class="material-symbols-outlined absolute left-3.5 text-slate-400 dark:text-slate-500 text-[20px]">mail</span>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-slate-700 dark:text-slate-300 text-sm font-medium"
                            for="password">Senha</label>
                        <a class="text-sm text-primary hover:text-primary-dark dark:hover:text-blue-400 transition-colors font-medium"
                            href="#">Esqueceu a senha?</a>
                    </div>
                    <div class="relative flex items-center">
                        <input
                            class="w-full h-12 rounded-lg bg-slate-50 dark:bg-[#151a25] border border-slate-200 dark:border-border-dark text-slate-900 dark:text-white text-sm px-4 pl-11 focus:ring-2 focus:ring-primary/50 focus:border-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none"
                            id="password" placeholder="••••••••" type="password" />
                        <span
                            class="material-symbols-outlined absolute left-3.5 text-slate-400 dark:text-slate-500 text-[20px]">lock</span>
                        <button
                            class="absolute right-3.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button onclick="location.href='dashboard.html'"
                    class="mt-2 w-full h-12 bg-gradient-to-r from-primary to-[#2b5ff5] hover:from-primary-dark hover:to-primary text-white font-semibold rounded-lg shadow-lg shadow-blue-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                    type="button">
                    <span>Entrar na Plataforma</span>
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative px-8 py-6">
                <div aria-hidden="true" class="absolute inset-0 flex items-center px-8">
                    <div class="w-full border-t border-slate-200 dark:border-border-dark"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="bg-white dark:bg-surface-dark px-2 text-slate-500 dark:text-slate-400">Ou continue com
                        SSO</span>
                </div>
            </div>

            <!-- Social/Enterprise Logins -->
            <div class="px-8 pb-10 flex flex-col gap-3">
                <button
                    class="w-full h-11 flex items-center justify-center gap-3 rounded-lg border border-slate-200 dark:border-border-dark bg-white dark:bg-[#151a25] hover:bg-slate-50 dark:hover:bg-[#1c2230] text-slate-700 dark:text-slate-200 font-medium transition-colors text-sm group"
                    type="button">
                    <img alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCLnuY1Lv5TRe-ayrwai2RLFBRh2omwxALIB6_07OxmFLFwE62PbgWfl6k0GsHGi42Z7GL6mbzuF6JkVpxawk4Bp3n7pi2iqSYbKGNh24GGSoYYByxvtXMlyxA0hPDGgRStORqCUV03i6lcuD7UfcphzRyw2CcfLoOC2SfV-ibSwsNdOK3xu7GMrJn0z9GWHl9Ly8VtdKVcCXt58BYZQqve9LoARxdRFyCZNhOb0UC0BtgrMVHRg4itM62PfoXqdv71Wi2HU2a0sbo" />
                    <span>Entrar com Google</span>
                </button>
            </div>

            <!-- Footer Links -->
            <div
                class="bg-slate-50 dark:bg-[#151a25]/50 px-8 py-4 border-t border-slate-200 dark:border-border-dark flex items-center justify-between text-sm">
                <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors"
                    href="#">Política de Privacidade</a>
                <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors"
                    href="#">Termos de Uso</a>
            </div>
        </div>

        <!-- Python Powered Badge -->
        <div class="absolute bottom-6 flex items-center gap-2 opacity-40 hover:opacity-80 transition-opacity">
            <span class="text-sm text-slate-400 dark:text-slate-500 font-medium">Powered by Python Analytics
                Engine</span>
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </main>
</body>

</html>
