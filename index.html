<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlayFitness | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#0e0e0f",
                        "primary-dim": "#e02928",
                        "primary": "#ff8e82",
                        "surface-container-highest": "#262627"
                    },
                    fontFamily: { "headline": ["Inter"], "body": ["Inter"] },
                    borderRadius: { "lg": "2rem", "xl": "3rem" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0f; color: #ffffff; }
        .glass-card { background: rgba(26, 25, 27, 0.6); backdrop-filter: blur(24px); }
        .glow-soft { box-shadow: 0 0 60px rgba(224, 41, 40, 0.05); }
    </style>
</head>

<body class="bg-background flex items-center justify-center min-h-screen p-6 overflow-hidden relative">
    <!-- Background Decor -->
    <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary-dim/5 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-primary-dim/3 rounded-full blur-[120px] -z-10"></div>

    <div class="w-full max-w-md space-y-8 relative">
        <div class="text-center space-y-2">
            <h1 class="text-[4rem] font-black text-[#ff8e82] tracking-tighter italic leading-none">PlayFitness</h1>
            <p class="font-bold text-[0.7rem] uppercase tracking-[0.4em] text-white/30 italic">Inteligência Estratégica</p>
        </div>

        <div class="glass-card p-10 rounded-xl border border-white/5 glow-soft space-y-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-white/40 ml-1 italic">Acesso Restrito</label>
                    <input type="text" value="SMAYK TR" readonly class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm font-bold uppercase italic text-white/50 cursor-not-allowed">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-white/40 ml-1 italic">Chave de Segurança</label>
                    <input type="password" value="••••••••" readonly class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm font-bold italic text-white/50 cursor-not-allowed">
                </div>
            </div>

            <button onclick="location.href='dashboard.html'" class="w-full bg-primary-dim text-white py-5 rounded-2xl font-black text-sm uppercase italic hover:scale-[1.02] active:scale-95 transition-all shadow-2xl shadow-primary-dim/20 flex items-center justify-center gap-3">
                <span>Inicializar Módulos</span>
                <span class="material-symbols-outlined text-[18px]">bolt</span>
            </button>
        </div>

        <p class="text-center text-[10px] font-bold text-white/10 uppercase tracking-widest">© 2026 PlayFitness Quantum Analysis • Faculdade Estácio</p>
    </div>
</body>

</html>
