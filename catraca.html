<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlayFitness | Controle de Acesso Inteligente</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="supabase.js"></script>
    
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #000000; overflow: hidden; }
        .scanner-ring { border: 2px solid rgba(239, 68, 68, 0.2); border-radius: 50%; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #ef4444; box-shadow: 0 0 15px #ef4444; opacity: 0.5; animation: scan 3s ease-in-out infinite; }
        
        @keyframes scan {
            0%, 100% { top: 0; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        .status-card { -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .access-granted { border-color: #10b981 !important; color: #10b981 !important; box-shadow: 0 0 50px rgba(16, 185, 129, 0.2); }
        .access-denied { border-color: #ef4444 !important; color: #ef4444 !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); }
        
        video { transform: scaleX(-1); } /* Mirror effect */
    </style>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center h-screen px-6">

    <!-- Digital Header -->
    <div class="absolute top-10 flex flex-col items-center">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-primary">PlayFitness</h1>
        <p class="text-[10px] tracking-[0.4em] text-zinc-500 uppercase font-black">Biometric Access Protocol <span class="bg-primary/20 text-primary px-1.5 py-0.5 rounded ml-2 animate-pulse">Dual Engine (JS+PY)</span></p>
    </div>

    <!-- Scanner Main Unit -->
    <div class="relative w-72 h-72 sm:w-80 sm:h-80 md:w-96 md:h-96">
        <!-- Outer Decorations -->
        <div class="absolute -inset-8 border border-white/5 rounded-full animate-[spin_20s_linear_infinite]"></div>
        <div class="absolute -inset-4 border border-primary/20 rounded-full animate-[spin_10s_linear_reverse_infinite]"></div>
        
        <!-- Video Container -->
        <div class="absolute inset-0 rounded-full overflow-hidden border-4 border-white/10 bg-zinc-900 shadow-[0_0_80px_rgba(239,68,68,0.1)]">
            <video id="webcam" autoplay muted playsinline class="w-full h-full object-cover grayscale"></video>
            <canvas id="overlay" class="absolute inset-0 pointer-events-none"></canvas>
            <div class="scanner-line"></div>
        </div>

        <!-- Corner Details -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-primary/40 rounded-tl-3xl"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-primary/40 rounded-tr-3xl"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-primary/40 rounded-bl-3xl"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-primary/40 rounded-br-3xl"></div>

        <!-- Biometric HUD elements -->
        <div class="absolute -top-12 -left-12 text-[8px] font-black text-primary/40 tracking-[0.2em] uppercase origin-left rotate-90 hidden md:block">Vector: 0.2838.12</div>
        <div class="absolute -bottom-12 -right-12 text-[8px] font-black text-primary/40 tracking-[0.2em] uppercase origin-right -rotate-90 hidden md:block">Neural Engine: Active</div>
        </div>
        
        <!-- Instruction Tooltip -->
        <div id="instructionHUD" class="absolute -bottom-16 left-1/2 -translate-x-1/2 bg-primary/10 backdrop-blur-md border border-primary/20 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-primary animate-pulse transition-all duration-300 opacity-100 flex items-center gap-3 min-w-[240px] justify-center">
            <span class="material-symbols-outlined text-[16px]">info</span>
            <span id="instructionText">Aguardando Rosto...</span>
        </div>
    </div>

    <!-- Info Display Area -->
    <div id="statusArea" class="mt-16 w-full max-w-sm status-card rounded-[2.5rem] p-8 text-center transition-all duration-500 opacity-0 transform translate-y-10">
        <h2 id="studentName" class="text-2xl font-black italic uppercase font-headline tracking-tighter mb-2">Processando...</h2>
        <p id="studentStatus" class="text-[10px] uppercase tracking-[0.3em] font-black italic mb-4">Aguardando Identificação</p>
        <div id="statusIcon" class="w-16 h-16 rounded-full mx-auto flex items-center justify-center bg-white/5">
            <span class="material-symbols-outlined text-3xl">hourglass_empty</span>
        </div>
        <p id="welcomeMsg" class="mt-4 text-[11px] text-zinc-500 font-medium"></p>
    </div>

    <!-- Bottom Controls -->
    <div class="absolute bottom-10 flex gap-4">
        <button onclick="location.reload()" class="p-3 bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/5">
            <span class="material-symbols-outlined text-[18px] text-zinc-400">refresh</span>
        </button>
        <button onclick="location.href='dashboard.html'" class="px-8 py-3 bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/5 font-black text-[10px] uppercase tracking-widest text-zinc-400">
            Sair do Terminal
        </button>
    </div>

    <!-- Audio Effects -->
    <audio id="audioSuccess" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>
    <audio id="audioError" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        let faceMatcher = null;
        let labeledDescriptors = [];
        let modelLoaded = false;
        let lastId = null;
        let detectionInterval = null;
        let livenessStatus = 'waiting'; // 'waiting', 'verifying', 'confirmed'
        let blinkCounter = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            await initScanner();
        });

        async function initScanner() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                updateUI('Sistema', 'Carregando IA', 'psychology', 'Iniciando modelos de reconhecimento...', 'waiting');
                
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                modelLoaded = true;
                await loadStudentsFromSupabase();
                await startVideo();
                startDetection();
            } catch (err) {
                console.error("Erro no scanner:", err);
                updateUI('Erro', 'Falha de Sistema', 'error', 'Não foi possível carregar a IA.', 'denied');
            }
        }

        async function loadStudentsFromSupabase() {
            const { data, error } = await window.supabaseClient
                .from('alunos')
                .select('id, nome_completo, biometria_facial, situacao_financeira')
                .not('biometria_facial', 'is', null);

            if (data && data.length > 0) {
                labeledDescriptors = data.map(aluno => {
                    const descriptor = new Float32Array(aluno.biometria_facial);
                    return new faceapi.LabeledFaceDescriptors(
                        aluno.id.toString(), 
                        [descriptor]
                    );
                });
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                console.log(`${data.length} alunos biometricos carregados.`);
            }
        }

        async function startVideo() {
            const video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
        }

        function startDetection() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('overlay');
            const instrHUD = document.getElementById('instructionHUD');
            const instrText = document.getElementById('instructionText');
            
            detectionInterval = setInterval(async () => {
                if (!modelLoaded || !faceMatcher) return;

                const detections = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                if (detections) {
                    const box = detections.detection.box;
                    const faceSize = (box.width + box.height) / 2;
                    
                    // LÓGICA DE FEEDBACK UX
                    if (faceSize < 160) {
                        instrText.innerText = "Aproxime seu rosto";
                        instrHUD.style.borderColor = "rgba(239, 68, 68, 0.4)";
                    } else if (faceSize > 350) {
                        instrText.innerText = "Afastese um pouco";
                        instrHUD.style.borderColor = "rgba(239, 68, 68, 0.4)";
                    } else if (livenessStatus === 'verifying') {
                        instrText.innerText = "Pisque agora para entrar";
                        instrHUD.style.borderColor = "#fbbf24";
                        instrHUD.classList.add('bg-yellow-500/10');
                    } else {
                        instrText.innerText = "Mantenha o rosto fixo";
                        instrHUD.style.borderColor = "rgba(16, 185, 129, 0.4)";
                        instrHUD.classList.remove('bg-yellow-500/10');
                    }

                    const bestMatch = faceMatcher.findBestMatch(detections.descriptor);
                    
                    if (livenessStatus === 'waiting') {
                        processMatch(bestMatch, detections.landmarks);
                    } else if (livenessStatus === 'verifying') {
                        checkBlink(detections.landmarks);
                    }
                } else {
                    instrText.innerText = "Posicione seu rosto";
                    instrHUD.style.borderColor = "rgba(255, 255, 255, 0.1)";
                }
            }, 200); 
        }

        // Função para detectar piscar de olhos (EAR - Eye Aspect Ratio simplificado)
        function checkBlink(landmarks) {
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();

            // Distância vertical vs horizontal (simplificada)
            const leftDist = Math.abs(leftEye[1].y - leftEye[5].y) / Math.abs(leftEye[0].x - leftEye[3].x);
            const rightDist = Math.abs(rightEye[1].y - rightEye[5].y) / Math.abs(rightEye[0].x - rightEye[3].x);

            // Se a proporção for muito baixa, o olho está fechado (piscou)
            if (leftDist < 0.22 && rightDist < 0.22) {
                blinkCounter++;
                if (blinkCounter >= 2) { // Exigir que feche por 2 frames
                    livenessStatus = 'confirmed';
                    handleAccessGranted();
                }
            }
        }

        let pendingStudent = null;

        async function processMatch(match, landmarks) {
            if (match.label === 'unknown') {
                updateUI('Desconhecido', 'Acesso Negado', 'close', 'Este rosto não consta na base.', 'denied');
                logAcesso(null, 'tentativa_negada', 'Rosto desconhecido capturado.');
                return;
            }

            if (lastId === match.label) return;
            
            const { data, error } = await window.supabaseClient
                .from('alunos')
                .select('*')
                .eq('id', match.label)
                .single();

            if (data) {
                pendingStudent = data;
                if (data.situacao_financeira === 'em dia') {
                    livenessStatus = 'verifying';
                    blinkCounter = 0;
                    updateUI(data.nome_completo, 'Prova de Vida', 'visibility', 'Pisque os olhos para confirmar!', 'waiting');
                } else {
                    lastId = data.id;
                    updateUI(data.nome_completo, 'Acesso Bloqueado', 'warning', 'Pendência financeira. Favor ir à recepção.', 'denied');
                    logAcesso(data.id, 'bloqueado', 'Pendência financeira');
                    document.getElementById('audioError').play();
                    
                    setTimeout(() => { lastId = null; }, 5000);
                }
            }
        }

        async function handleAccessGranted() {
            const data = pendingStudent;
            lastId = data.id;
            livenessStatus = 'confirmed';
            
            // MENSAGEM VIP / MENSAGEM DE PLANO (UX do tutorial)
            let personalizedMsg = "Bem-vindo! Bom treino.";
            if (data.plano?.toLowerCase().includes('vip')) {
                personalizedMsg = `🏆 VIP DETECTADO: Excelente treino, ${data.nome_completo.split(' ')[0]}!`;
            } else if (data.status === 'Em Risco') {
                personalizedMsg = "⚠️ Notamos sua frequência baixa. Que bom te ver de volta!";
            }

            updateUI(data.nome_completo, 'Acesso Liberado', 'verified', personalizedMsg, 'granted');
            document.getElementById('audioSuccess').play();
            
            logAcesso(data.id, 'liberado', null);
            console.log(">>> [COMANDO] LIBERAR DISPOSITIVO FISICO");

            setTimeout(() => {
                lastId = null;
                livenessStatus = 'waiting';
                pendingStudent = null;
                document.getElementById('statusArea').style.opacity = "0";
            }, 4000);
        }

        async function logAcesso(alunoId, status, motivo) {
            try {
                await window.supabaseClient
                    .from('logs_acesso')
                    .insert({
                        aluno_id: alunoId,
                        status_acesso: status,
                        motivo_bloqueio: motivo,
                        metodo: 'biometria_facial'
                    });
            } catch (e) { console.error("Erro ao registrar log:", e); }
        }

        function updateUI(name, status, icon, msg, type) {
            const statusArea = document.getElementById('statusArea');
            document.getElementById('studentName').textContent = name;
            document.getElementById('studentStatus').textContent = status;
            document.getElementById('welcomeMsg').textContent = msg;
            document.getElementById('statusIcon').innerHTML = `<span class="material-symbols-outlined text-3xl">${icon}</span>`;
            
            statusArea.classList.remove('access-granted', 'access-denied');
            if (type === 'granted') statusArea.classList.add('access-granted');
            if (type === 'denied') statusArea.classList.add('access-denied');
            
            statusArea.style.opacity = "1";
            statusArea.style.transform = "translateY(0)";
        }
    </script>
</body>
</html>
