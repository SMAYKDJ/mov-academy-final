<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlayFitness | Gestão de Membros</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="playfitness-api.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#dc2626",
                        surface: "#141416",
                        "surface-dark": "#0a0a0b",
                        border: "rgba(255, 255, 255, 0.08)"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-surface-dark text-white font-sans antialiased min-h-screen flex flex-col md:flex-row overflow-hidden">
    
    <!-- Sidebar (Same as Dashboard) -->
    <aside class="w-full md:w-64 bg-surface border-b md:border-b-0 md:border-r border-border flex flex-col shrink-0 z-50">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="size-10 bg-primary/10 border border-primary/20 rounded-xl flex items-center justify-center shadow-lg shadow-primary/5">
                    <span class="material-symbols-outlined text-primary text-2xl font-bold">bolt</span>
                </div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">
                    PLAY<span class="text-primary">FITNESS</span>
                </h1>
            </div>

            <nav class="space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-text-muted hover:text-white hover:bg-white/5 transition-all group">
                    <span class="material-symbols-outlined text-[22px] group-hover:scale-110 transition-transform">dashboard</span>
                    <span class="text-sm font-bold uppercase tracking-wider italic">Dashboard</span>
                </a>
                <a href="membros.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-primary/10 text-primary border border-primary/20 transition-all group shadow-lg shadow-primary/5">
                    <span class="material-symbols-outlined text-[22px] group-hover:scale-110 transition-transform">group</span>
                    <span class="text-sm font-bold uppercase tracking-wider italic">Membros</span>
                </a>
                <a href="campanhas.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-text-muted hover:text-white hover:bg-white/5 transition-all group">
                    <span class="material-symbols-outlined text-[22px] group-hover:scale-110 transition-transform">campaign</span>
                    <span class="text-sm font-bold uppercase tracking-wider italic">Campanhas</span>
                </a>
                <a href="financeiro.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-text-muted hover:text-white hover:bg-white/5 transition-all group">
                    <span class="material-symbols-outlined text-[22px] group-hover:scale-110 transition-transform">payments</span>
                    <span class="text-sm font-bold uppercase tracking-wider italic">Financeiro</span>
                </a>
            </nav>
        </div>

        <div class="mt-auto p-6 border-t border-border">
            <div class="glass-card p-4 rounded-2xl border border-white/5 flex items-center gap-3">
                <div class="size-10 rounded-full border border-primary/20 bg-primary/10 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=dc2626&color=fff" class="size-full object-cover">
                </div>
                <div>
                    <p class="text-[10px] font-black text-text-muted uppercase tracking-widest">Gestor</p>
                    <p class="text-xs font-bold text-white uppercase italic">SMAYK TR</p>
                </div>
            </div>
            <button onclick="location.href='index.html'" class="w-full mt-4 flex items-center justify-center gap-2 py-3 text-text-muted hover:text-primary transition-colors text-[10px] font-black uppercase tracking-[0.2em] italic">
                <span class="material-symbols-outlined text-[16px]">logout</span>
                Encerrar Sessão
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Header -->
        <header class="h-20 border-b border-border flex items-center justify-between px-8 bg-surface/50 backdrop-blur-xl shrink-0">
            <div class="flex flex-col">
                <h2 class="text-xl font-black italic uppercase tracking-tighter">
                    Gestão <span class="text-primary italic">Comportamental</span>
                </h2>
                <p class="text-[10px] font-bold text-text-muted uppercase tracking-[.2em] italic">Board Kanban & IA Sync</p>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative hidden sm:block">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-[18px]">search</span>
                    <input type="text" placeholder="BUSCAR ALUNO..." class="bg-surface-dark border border-border rounded-full py-2 pl-10 pr-6 text-[10px] font-bold italic tracking-widest focus:ring-1 focus:ring-primary outline-none transition-all w-64 placeholder:text-text-muted/40 uppercase">
                </div>
                <button onclick="openModal('register')" class="btn-primary px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest italic flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">person_add</span>
                    Novo Cadastro
                </button>
            </div>
        </header>

        <!-- Kanban View -->
        <div id="membrosContent" class="flex-1 overflow-x-auto p-8 scroll-smooth">
            <div class="flex gap-6 h-full min-w-max">
                <!-- Prospect -->
                <div class="kanban-column w-80 shrink-0 flex flex-col bg-surface/30 rounded-[32px] border border-border p-4" data-status="Prospect">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex items-center gap-2">
                            <span class="size-2 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)]"></span>
                            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Prospecção</h3>
                        </div>
                        <span class="count text-[11px] font-black text-text-muted/50 font-mono">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Prospect')"></div>
                </div>

                <!-- Experimental -->
                <div class="kanban-column w-80 shrink-0 flex flex-col bg-surface/30 rounded-[32px] border border-border p-4" data-status="Experimental">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex items-center gap-2">
                            <span class="size-2 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.3)]"></span>
                            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Auditivo</h3>
                        </div>
                        <span class="count text-[11px] font-black text-text-muted/50 font-mono">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Experimental')"></div>
                </div>

                <!-- Ativo -->
                <div class="kanban-column w-80 shrink-0 flex flex-col bg-surface/30 rounded-[32px] border border-border p-4" data-status="Ativo">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex items-center gap-2">
                            <span class="size-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]"></span>
                            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Ativos</h3>
                        </div>
                        <span class="count text-[11px] font-black text-text-muted/50 font-mono">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Ativo')"></div>
                </div>

                <!-- Em Risco -->
                <div class="kanban-column w-80 shrink-0 flex flex-col bg-surface/30 rounded-[32px] border border-border p-4" data-status="Em Risco">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex items-center gap-2">
                            <span class="size-2 rounded-full bg-primary shadow-[0_0_10px_rgba(220,38,38,0.3)] animate-pulse"></span>
                            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Risco IA</h3>
                        </div>
                        <span class="count text-[11px] font-black text-text-muted/50 font-mono">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Em Risco')"></div>
                </div>

                <!-- Inativo -->
                <div class="kanban-column w-80 shrink-0 flex flex-col bg-surface/30 rounded-[32px] border border-border p-4" data-status="Inativo">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex items-center gap-2">
                            <span class="size-2 rounded-full bg-gray-500 shadow-[0_0_10px_rgba(107,114,128,0.3)]"></span>
                            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Inativos</h3>
                        </div>
                        <span class="count text-[11px] font-black text-text-muted/50 font-mono">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Inativo')"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals (Simplified/Stylized) -->
    <div id="modalOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-surface-dark/80 backdrop-blur-xl">
        <div class="glass-card w-full max-w-2xl rounded-[32px] border border-border overflow-hidden shadow-2xl transition-all scale-95 opacity-0 duration-300" id="modalContent">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex flex-col">
                        <h3 id="modalTitle" class="text-xl font-black italic uppercase tracking-tighter">Novo Aluno</h3>
                        <p id="modalSubtitle" class="text-[10px] font-bold text-text-muted uppercase tracking-widest italic">PlayFitness Onboarding V3</p>
                    </div>
                    <button onclick="closeModal()" class="size-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-all">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>

                <form id="memberForm" class="space-y-6" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="formAction">
                    <input type="hidden" id="memberId">
                    <input type="hidden" id="memberPhoto">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-text-muted uppercase tracking-widest italic ml-1">Nome Completo</label>
                            <input type="text" id="memberName" required class="w-full bg-surface-dark border border-border rounded-2xl py-3 px-4 text-sm focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted/40 uppercase font-bold italic">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-text-muted uppercase tracking-widest italic ml-1">WhatsApp</label>
                            <input type="tel" id="memberPhone" required class="w-full bg-surface-dark border border-border rounded-2xl py-3 px-4 text-sm focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-text-muted/40 uppercase font-bold italic">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-text-muted uppercase tracking-widest italic ml-1">Plano Estratégico</label>
                            <select id="memberPlan" class="w-full bg-surface-dark border border-border rounded-2xl py-3 px-4 text-sm focus:ring-1 focus:ring-primary outline-none transition-all uppercase font-bold italic">
                                <option value="Mensal Básico">Mensal Básico</option>
                                <option value="Pro Semestral">Pro Semestral</option>
                                <option value="VIP Anual">VIP Anual</option>
                                <option value="Experimental">Experimental</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-text-muted uppercase tracking-widest italic ml-1">Status Base</label>
                            <select id="memberStatus" class="w-full bg-surface-dark border border-border rounded-2xl py-3 px-4 text-sm focus:ring-1 focus:ring-primary outline-none transition-all uppercase font-bold italic">
                                <option value="Prospect">Prospecção</option>
                                <option value="Experimental">Experimental</option>
                                <option value="Ativo">Ativo</option>
                                <option value="Em Risco">Em Risco</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-primary py-4 rounded-2xl text-base shadow-xl group flex items-center justify-center gap-3">
                        <span class="uppercase font-black italic">Gravar no Sistema Neural</span>
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">save</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function loadMembers() {
            try {
                const members = await PlayFitnessAPI.students.list();
                document.querySelectorAll('.cards-container').forEach(c => c.innerHTML = '');
                const counts = { 'Prospect': 0, 'Experimental': 0, 'Ativo': 0, 'Em Risco': 0, 'Inativo': 0 };

                members.forEach(member => {
                    const status = member.status || 'Ativo';
                    const container = document.querySelector(`[data-status="${status}"] .cards-container`);
                    if (container) {
                        counts[status]++;
                        container.appendChild(createMemberCard(member));
                    }
                });

                Object.keys(counts).forEach(status => {
                    const label = document.querySelector(`[data-status="${status}"] .count`);
                    if (label) label.textContent = counts[status].toString().padStart(2, '0');
                });
            } catch (err) {
                console.error(err);
                PlayFitnessUI.toast('Erro ao carregar rede neural', 'error');
            }
        }

        function createMemberCard(member) {
            const div = document.createElement('div');
            div.className = 'glass-card p-4 rounded-2xl border border-white/5 hover:border-primary/40 transition-all group relative cursor-grab active:cursor-grabbing shadow-lg';
            div.draggable = true;
            div.id = `member-${member.id}`;
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', member.id);
                div.classList.add('opacity-40');
            });
            div.addEventListener('dragend', () => div.classList.remove('opacity-40'));

            const scoreColor = (member.score_ia || 0) >= 70 ? 'text-emerald-500' : ((member.score_ia || 0) >= 40 ? 'text-amber-500' : 'text-primary');

            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="size-10 rounded-full border border-white/10 overflow-hidden shrink-0">
                        <img src="${member.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(member.nome_completo)}&background=141416&color=ef4444`}" class="size-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-xs font-black italic uppercase italic leading-tight truncate">
                            <span class="text-primary mr-1 opacity-50 not-italic font-bold">#${member.codigo || '---'}</span>
                            ${member.nome_completo}
                        </h4>
                        <div class="flex items-center justify-between mt-2">
                             <p class="text-[9px] font-black text-text-muted uppercase tracking-widest italic">${member.plano || 'N/A'}</p>
                             <p class="text-[10px] font-black ${scoreColor} italic items-center flex gap-1">
                                <span class="material-symbols-outlined text-[12px]">bolt</span>
                                ${member.score_ia || 0}%
                             </p>
                        </div>
                    </div>
                </div>
                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="openModal('edit', '${member.id}')" class="size-7 rounded-full bg-white/5 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-all">
                        <span class="material-symbols-outlined text-[16px]">edit</span>
                    </button>
                </div>
            `;
            return div;
        }

        function openModal(action, id = '') {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);

            document.getElementById('formAction').value = action;
            document.getElementById('memberId').value = id;

            if (action === 'edit') {
                document.getElementById('modalTitle').textContent = 'Editar Fluxo';
                loadMemberDetails(id);
            } else {
                document.getElementById('modalTitle').textContent = 'Novo Fluxo';
                document.getElementById('memberForm').reset();
            }
        }

        async function loadMemberDetails(id) {
            try {
                const data = await PlayFitnessAPI.students.getById(id);
                if (data) {
                    document.getElementById('memberName').value = data.nome_completo || '';
                    document.getElementById('memberPhone').value = data.telefone || '';
                    document.getElementById('memberStatus').value = data.status || 'Ativo';
                    document.getElementById('memberPlan').value = data.plano || 'Mensal Básico';
                }
            } catch (err) {
                console.error(err);
                PlayFitnessUI.toast('Erro no download neural', 'error');
            }
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');
            }, 300);
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const action = document.getElementById('formAction').value;
            const id = document.getElementById('memberId').value;

            const payload = {
                nome_completo: document.getElementById('memberName').value,
                telefone: document.getElementById('memberPhone').value,
                status: document.getElementById('memberStatus').value,
                plano: document.getElementById('memberPlan').value
            };

            try {
                await PlayFitnessAPI.students.save(id, payload);
                closeModal();
                PlayFitnessUI.toast(action === 'register' ? 'Matrícula Sincronizada!' : 'Fluxo Atualizado!', 'check_circle');
                loadMembers();
            } catch (err) {
                console.error(err);
                PlayFitnessUI.toast('Erro no uplink', 'error');
            }
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('bg-white/5');
        }

        async function handleDrop(event, newStatus) {
            event.preventDefault();
            event.currentTarget.classList.remove('bg-white/5');
            const id = event.dataTransfer.getData('text/plain');
            if (!id) return;

            try {
                await PlayFitnessAPI.students.save(id, { status: newStatus });
                PlayFitnessUI.toast(`Status: ${newStatus}`, 'sync');
                loadMembers();
            } catch (err) {
                console.error(err);
                PlayFitnessUI.toast('Erro de Sincronia', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadMembers);
    </script>
</body>

</html>
