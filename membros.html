<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlayFitness | Membros</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- API & Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="playfitness-api.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-variant": "#262627",
                        "on-secondary": "#525154",
                        "surface-dim": "#0e0e0f",
                        "on-surface": "#ffffff",
                        "on-primary-fixed-variant": "#600005",
                        "secondary-fixed": "#e5e1e4",
                        "surface-bright": "#2c2c2d",
                        "error-dim": "#d73357",
                        "on-secondary-fixed-variant": "#5c5b5d",
                        "outline": "#767576",
                        "secondary-fixed-dim": "#d6d3d6",
                        "inverse-primary": "#c00815",
                        "background": "#0e0e0f",
                        "secondary-container": "#474649",
                        "on-tertiary-fixed-variant": "#531a80",
                        "on-primary-fixed": "#000000",
                        "on-tertiary": "#4e137b",
                        "on-background": "#ffffff",
                        "surface-container-high": "#201f21",
                        "on-primary-container": "#4f0003",
                        "on-error-container": "#ffb2b9",
                        "on-primary": "#650005",
                        "inverse-surface": "#fcf8f9",
                        "on-error": "#490013",
                        "surface-container-low": "#131314",
                        "surface": "#0e0e0f",
                        "surface-container": "#1a191b",
                        "on-secondary-container": "#d2cfd2",
                        "tertiary-fixed-dim": "#c48bf4",
                        "primary-container": "#ff766a",
                        "on-secondary-fixed": "#403f41",
                        "tertiary-fixed": "#d199ff",
                        "surface-container-lowest": "#000000",
                        "primary-fixed": "#ff766a",
                        "primary-fixed-dim": "#ff5b50",
                        "on-surface-variant": "#adaaab",
                        "tertiary-dim": "#bf85ee",
                        "on-tertiary-fixed": "#280046",
                        "outline-variant": "#484849",
                        "inverse-on-surface": "#565556",
                        "secondary": "#e5e1e4",
                        "primary-dim": "#e02928",
                        "primary": "#ff8e82",
                        "surface-tint": "#ff8e82",
                        "tertiary": "#d5a1ff",
                        "tertiary-container": "#ca90fa",
                        "secondary-dim": "#d6d3d6",
                        "error": "#ff6e84",
                        "error-container": "#a70138",
                        "on-tertiary-container": "#42006f",
                        "surface-container-highest": "#262627"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0f; color: #ffffff; overflow-x: hidden !important; width: 100vw; }
        html { overflow-x: hidden !important; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(26, 25, 27, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .glow-primary { box-shadow: 0 0 48px rgba(224, 41, 40, 0.04); }
        .kanban-column { background: rgba(26, 25, 27, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>

<body class="bg-background text-on-background antialiased overflow-hidden h-screen flex">
    <!-- SideNavBar -->
    <aside class="w-64 border-r border-white/5 bg-[#0e0e0f] flex flex-col py-8 px-4 shrink-0 overflow-y-auto">
        <div class="mb-10 px-2">
            <h1 class="text-xl font-black text-[#ff8e82] tracking-tighter italic">PlayFitness</h1>
            <p class="font-['Inter'] font-extrabold tracking-[-0.04em] uppercase text-[0.75rem] text-white/50 mt-1">Inteligência Estratégica</p>
        </div>
        <nav class="flex-1 space-y-2">
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/50 hover:text-white hover:bg-white/5 transition-colors" href="dashboard.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-medium text-sm">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-[#ff8e82] border-r-2 border-[#ff8e82] bg-gradient-to-r from-[#e02928]/10 to-transparent transition-all" href="membros.html">
                <span class="material-symbols-outlined">group</span>
                <span class="font-medium text-sm">Membros</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/50 hover:text-white hover:bg-white/5 transition-colors" href="financeiro.html">
                <span class="material-symbols-outlined">payments</span>
                <span class="font-medium text-sm">Financeiro</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/50 hover:text-white hover:bg-white/5 transition-colors" href="campanhas.html">
                <span class="material-symbols-outlined">campaign</span>
                <span class="font-medium text-sm">Campanhas</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/50 hover:text-white hover:bg-white/5 transition-colors" href="#">
                <span class="material-symbols-outlined">settings</span>
                <span class="font-medium text-sm">Configurações</span>
            </a>
        </nav>
        <button onclick="location.href='index.html'" class="mt-auto border border-white/5 text-white/40 py-4 rounded-xl font-bold text-xs hover:text-primary transition-all">
            Sair do Sistema
        </button>
    </aside>

    <!-- Main Content Canvas -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-x-hidden">
        <!-- TopAppBar -->
        <header class="h-16 bg-[#1a191b]/60 backdrop-blur-3xl flex items-center justify-between px-8 z-40 shrink-0 border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-primary-dim animate-pulse"></span>
                <span class="font-['Inter'] italic font-medium text-sm text-[#ff8e82]">Status: Membros Online</span>
            </div>
            <div class="flex items-center gap-6">
                 <button onclick="openModal('register')" class="bg-primary-dim text-white px-6 py-2 rounded-full font-extrabold text-xs flex items-center gap-2 hover:scale-105 transition-all">
                    <span class="material-symbols-outlined text-[18px]">person_add</span>
                    Novo Cadastro
                </button>
            </div>
        </header>

        <!-- Canvas Body -->
        <div class="flex-1 overflow-y-auto mt-8 px-10 overflow-x-hidden">
            <h2 class="text-4xl font-black tracking-tighter italic mb-8">Gestão <span class="text-primary italic">Comportamental</span></h2>
            
            <div id="membrosContent" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 pb-10 h-[calc(100vh-250px)] overflow-x-hidden">
                <!-- Prospect -->
                <div class="kanban-column w-full flex flex-col rounded-[2rem] p-4" data-status="Prospect">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-primary/60 italic">Prospecção</h3>
                        <span class="count text-[11px] font-bold text-white/20">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Prospect')"></div>
                </div>

                <!-- Experimental -->
                <div class="kanban-column w-full flex flex-col rounded-[2rem] p-4" data-status="Experimental">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-blue-400/60 italic">Experimental</h3>
                        <span class="count text-[11px] font-bold text-white/20">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Experimental')"></div>
                </div>

                <!-- Ativo -->
                <div class="kanban-column w-full flex flex-col rounded-[2rem] p-4" data-status="Ativo">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-emerald-400/60 italic">Ativos</h3>
                        <span class="count text-[11px] font-bold text-white/20">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Ativo')"></div>
                </div>

                <!-- Em Risco -->
                <div class="kanban-column w-full flex flex-col rounded-[2rem] p-4" data-status="Em Risco">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-error/60 italic">Risco IA</h3>
                        <span class="count text-[11px] font-bold text-white/20">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Em Risco')"></div>
                </div>

                <!-- Inativo -->
                <div class="kanban-column w-full flex flex-col rounded-[2rem] p-4" data-status="Inativo">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-white/20 italic">Inativos</h3>
                        <span class="count text-[11px] font-bold text-white/20">00</span>
                    </div>
                    <div class="cards-container space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'Inativo')"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-3xl">
        <div class="glass-card w-full max-w-lg rounded-[2.5rem] p-10 border border-white/5" id="modalContent">
            <h3 id="modalTitle" class="text-3xl font-black italic uppercase italic tracking-tighter mb-8 text-primary">Operação Aluno</h3>
            <form id="memberForm" class="space-y-6" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="formAction">
                <input type="hidden" id="memberId">
                <div class="space-y-4">
                    <input type="text" id="memberName" required placeholder="NOME COMPLETO" class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm placeholder:text-white/20 uppercase font-bold italic">
                    <input type="tel" id="memberPhone" required placeholder="WHATSAPP" class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm placeholder:text-white/20 uppercase font-bold italic">
                    <select id="memberPlan" class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm uppercase font-bold italic">
                        <option value="Mensal Básico">Mensal Básico</option>
                        <option value="Pro Semestral">Pro Semestral</option>
                        <option value="VIP Anual">VIP Anual</option>
                    </select>
                    <select id="memberStatus" class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-6 text-sm uppercase font-bold italic">
                        <option value="Prospect">Prospecção</option>
                        <option value="Experimental">Experimental</option>
                        <option value="Ativo">Ativo</option>
                        <option value="Em Risco">Em Risco</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-white/40">Cancelar</button>
                    <button type="submit" class="flex-[2] bg-primary-dim text-white py-4 rounded-2xl font-black text-sm uppercase italic shadow-xl shadow-primary-dim/20">Salvar Dados</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadMembers() {
            try {
                const members = await PlayFitnessAPI.students.list();
                document.querySelectorAll('.cards-container').forEach(c => c.innerHTML = '');
                const counts = { 'Prospect': 0, 'Experimental': 0, 'Ativo': 0, 'Em Risco': 0, 'Inativo': 0 };

                members.forEach(member => {
                    const status = member.status || 'Ativo';
                    const container = document.querySelector(`[data-status="${status}"] .cards-container`);
                    if (container) {
                        counts[status]++;
                        container.appendChild(createMemberCard(member));
                    }
                });

                Object.keys(counts).forEach(status => {
                    const label = document.querySelector(`[data-status="${status}"] .count`);
                    if (label) label.textContent = counts[status].toString().padStart(2, '0');
                });
            } catch (err) {
                console.error(err);
                PlayFitnessUI.toast('Erro no Data Center', 'error');
            }
        }

        function createMemberCard(member) {
            const div = document.createElement('div');
            div.className = 'glass-card p-5 rounded-2xl border border-white/5 hover:border-primary/40 transition-all group relative cursor-grab active:cursor-grabbing shadow-lg';
            div.draggable = true;
            div.id = `member-${member.id}`;
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', member.id);
                div.classList.add('opacity-40');
            });
            div.addEventListener('dragend', () => div.classList.remove('opacity-40'));

            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="size-12 rounded-full border border-white/10 overflow-hidden shrink-0">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(member.nome_completo)}&background=0e0e0f&color=ff8e82" class="size-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-xs font-black uppercase italic truncate">${member.nome_completo}</h4>
                        <p class="text-[9px] font-black text-white/40 uppercase tracking-[0.2em] mt-1 italic">${member.plano || 'N/A'}</p>
                    </div>
                </div>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-[10px] font-black text-primary italic">#${member.codigo || '---'}</span>
                    <button onclick="openModal('edit', '${member.id}')" class="size-6 rounded-full bg-white/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-[14px]">edit</span>
                    </button>
                </div>
            `;
            return div;
        }

        function openModal(action, id = '') {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.getElementById('formAction').value = action;
            document.getElementById('memberId').value = id;

            if (action === 'edit') {
                document.getElementById('modalTitle').textContent = 'Sincronizar Aluno';
                loadMemberDetails(id);
            } else {
                document.getElementById('modalTitle').textContent = 'Novo Registro';
                document.getElementById('memberForm').reset();
            }
        }

        async function loadMemberDetails(id) {
            const data = await PlayFitnessAPI.students.getById(id);
            if (data) {
                document.getElementById('memberName').value = data.nome_completo || '';
                document.getElementById('memberPhone').value = data.telefone || '';
                document.getElementById('memberStatus').value = data.status || 'Ativo';
                document.getElementById('memberPlan').value = data.plano || 'Mensal Básico';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.replace('flex', 'hidden');
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('memberId').value;
            const payload = {
                nome_completo: document.getElementById('memberName').value,
                telefone: document.getElementById('memberPhone').value,
                status: document.getElementById('memberStatus').value,
                plano: document.getElementById('memberPlan').value
            };
            await PlayFitnessAPI.students.save(id, payload);
            closeModal();
            PlayFitnessUI.toast('Dados Sincronizados!', 'check_circle');
            loadMembers();
        }

        function handleDragOver(e) { e.preventDefault(); }
        async function handleDrop(event, newStatus) {
            event.preventDefault();
            const id = event.dataTransfer.getData('text/plain');
            await PlayFitnessAPI.students.save(id, { status: newStatus });
            loadMembers();
        }

        document.addEventListener('DOMContentLoaded', loadMembers);
    </script>
</body>

</html>
