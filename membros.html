<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gestão Comportamental de Membros | CT Olimpo</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="playfitness-api.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#dc2626",
                        "primary-dark": "#991b1b",
                        secondary: "#f59e0b",
                        obsidian: "#0f172a",
                        "background-dark": "#0f172a",
                        "surface-dark": "#1a202e",
                        "surface-darker": "#0a0f1a",
                        "border-dark": "#2d3648",
                        "text-main": "#f1f5f9",
                        "text-muted": "#94a3b8",
                        "brand-pink": "#e91e63",
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        sans: ["Space Grotesk", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                },
            },
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .kanban-column {
            min-height: calc(100vh - 280px);
        }

        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        /* Utility Delays */
        .delay-100 {
            animation-delay: 0.1s;
        }
    </style>
</head>

    <script>
        let allMembersData = [];

        async function loadMembers() {
            try {
                const members = await PlayFitnessAPI.students.list();
                allMembersData = members.map(m => ({
                    nome: m.nome_completo,
                    foto: m.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.nome_completo)}`
                }));

                document.querySelectorAll('.cards-container').forEach(c => c.innerHTML = '');
                const counts = { 'Prospect': 0, 'Experimental': 0, 'Ativo': 0, 'Em Risco': 0, 'Inativo': 0 };

                members.forEach(member => {
                    const status = member.status || 'Ativo';
                    const container = document.querySelector(`[data-status="${status}"] .cards-container`);
                    if (container) {
                        counts[status]++;
                        container.appendChild(createMemberCard(member));
                    }
                });

                Object.keys(counts).forEach(status => {
                    const label = document.querySelector(`[data-status="${status}"] .count`);
                    if (label) label.textContent = counts[status];
                });
            } catch (err) {
                console.error('Erro:', err);
                showToast('Falha ao sincronizar dados', 'error');
            }
        }

        function createMemberCard(member) {
            const div = document.createElement('div');
            div.className = 'bg-surface-dark/80 backdrop-blur-xl border border-white/5 p-3 rounded-xl shadow-2xl hover:border-red-500/40 transition-all group relative cursor-grab active:cursor-grabbing hover:translate-y-[-2px] h-[100px] flex items-center overflow-hidden';
            div.draggable = true;
            div.id = `member-${member.id}`;
            div.addEventListener('dragstart', (e) => handleDragStart(e, member.id));

            const isRisk = (member.status === 'Em Risco' || (member.score_ia && member.score_ia < 40));
            const scoreColor = member.score_ia >= 70 ? 'text-emerald-600' : (member.score_ia >= 40 ? 'text-amber-500' : 'text-rose-600');
            const progressBg = member.score_ia >= 70 ? 'bg-emerald-500' : (member.score_ia >= 40 ? 'bg-amber-500' : 'bg-rose-500');

            div.innerHTML = `
                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                    <button onclick="openPlayFitnessMessenger('${member.id}', '${member.nome_completo}', '${member.telefone || ''}', ${member.score_ia || 0})"
                        class="size-7 rounded-full bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all shadow-sm ${isRisk ? 'pulse-red' : ''}" title="Ação IA">
                        <span class="material-symbols-outlined text-[16px]">bolt</span>
                    </button>
                    <button onclick="openModal('edit', null, '${member.id}', '${member.codigo || ''}')"
                        class="size-7 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-slate-200 hover:text-slate-600 transition-all shadow-sm">
                        <span class="material-symbols-outlined text-[16px]">edit_note</span>
                    </button>
                </div>
                <div class="flex items-center gap-3 w-full">
                    <div class="size-12 rounded-full overflow-hidden border border-white/5 shadow-lg shrink-0">
                         <img src="${member.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(member.nome_completo)}&background=1e293b&color=ef4444`}" 
                               class="size-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 pr-12">
                        <div class="flex justify-between items-start mb-0.5">
                            <h4 class="text-text-main font-black text-[13px] truncate uppercase italic tracking-tight">
                                <span class="text-red-500 mr-1 opacity-50 not-italic">#${member.codigo || '---'}</span>
                                ${member.nome_completo}
                            </h4>
                        </div>
                        <div class="flex items-center justify-between mb-0.5">
                            <span class="text-[11px] uppercase font-bold text-text-muted tracking-tighter">Score IA</span>
                            <span class="text-xs font-black ${scoreColor}">${member.score_ia || 80}%</span>
                        </div>
                        <div class="w-full bg-surface-darker/50 rounded-full h-1 overflow-hidden">
                            <div class="${progressBg} h-full rounded-full transition-all duration-1000" style="width: ${member.score_ia || 80}%"></div>
                        </div>
                        <div class="mt-1 flex items-center gap-3">
                             <span class="text-[11px] font-mono text-text-muted">CPF: ${member.cpf || '---'}</span>
                             <span class="text-[11px] font-bold text-text-muted uppercase px-1.5 py-0.5 bg-surface-darker/50 rounded border border-white/5">${PlayFitnessAPI.utils.calculateAge(member.data_nascimento)} anos</span>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        function openModal(action, name = '', id = '', codigo = '') {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.add('active');

            document.getElementById('formAction').value = action;
            document.getElementById('memberId').value = id;

            if (action === 'edit') {
                document.getElementById('modalTitle').textContent = 'Editar Cadastro';
                document.getElementById('nextCodeInfo').classList.add('hidden');
                document.getElementById('currentCodeInfo').textContent = `Matrícula: #${codigo.toString().padStart(3, '0')}`;
                document.getElementById('currentCodeInfo').classList.remove('hidden');
                loadMemberDetails(id);
            } else {
                document.getElementById('modalTitle').textContent = 'Novo Cadastro';
                document.getElementById('currentCodeInfo').classList.add('hidden');
                document.getElementById('memberForm').reset();
                document.getElementById('memberPhoto').value = '';
                document.getElementById('photoPreview').innerHTML = '<span class="material-symbols-outlined text-text-muted text-3xl group-hover:scale-110 transition-transform">add_a_photo</span>';
                showNextAvailableCode();
            }
        }

        async function showNextAvailableCode() {
            const nextCode = await PlayFitnessAPI.students.getNextCode();
            const info = document.getElementById('nextCodeInfo');
            info.textContent = `Próxima Matrícula: #${nextCode.toString().padStart(3, '0')}`;
            info.classList.remove('hidden');
        }

        async function loadMemberDetails(id) {
            try {
                const data = await PlayFitnessAPI.students.getById(id);
                if (data) {
                    document.getElementById('memberName').value = data.nome_completo || '';
                    document.getElementById('memberEmail').value = data.email || '';
                    document.getElementById('memberPhone').value = data.telefone || '';
                    document.getElementById('memberCPF').value = data.cpf || '';
                    const photoUrl = data.foto_url || '';
                    document.getElementById('memberPhoto').value = photoUrl;
                    if (photoUrl) {
                        document.getElementById('photoPreview').innerHTML = `<img src="${photoUrl}" class="w-full h-full object-cover">`;
                    } else {
                        document.getElementById('photoPreview').innerHTML = '<span class="material-symbols-outlined text-text-muted text-3xl group-hover:scale-110 transition-transform">add_a_photo</span>';
                    }
                    document.getElementById('memberStatus').value = data.status || 'Ativo';
                    document.getElementById('memberAddress').value = data.endereco || '';
                    document.getElementById('memberNeighborhood').value = data.bairro || '';
                    document.getElementById('memberCity').value = data.cidade || '';
                    document.getElementById('memberReferrer').value = data.indicado_por || '';
                    document.getElementById('memberPlan').value = data.plano || 'Mensal Básico';
                    document.getElementById('memberBirth').value = data.data_nascimento || '';
                    document.getElementById('memberCampaign').value = data.campanha || 'Orgânico';
                }
            } catch (err) {
                console.error(err);
                showToast('Erro ao carregar detalhes', 'error');
            }
        }

        async function handlePhotoUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const preview = document.getElementById('photoPreview');

                // Show loading state
                const originalContent = preview.innerHTML;
                preview.innerHTML = '<div class="flex flex-col items-center gap-1"><div class="size-4 border-2 border-red-500 border-t-transparent animate-spin rounded-full"></div><span class="text-[11px] font-bold text-red-500 uppercase">Enviando</span></div>';

                try {
                    const publicUrl = await PlayFitnessAPI.storage.upload(file);
                    document.getElementById('memberPhoto').value = publicUrl;
                    preview.innerHTML = `<img src="${publicUrl}" class="w-full h-full object-cover">`;
                    showToast('Foto atualizada com sucesso!', 'check_circle');
                } catch (err) {
                    console.error('Erro no upload:', err);
                    preview.innerHTML = originalContent;
                    showToast('Erro ao enviar foto. Verifique o bucket "membros".', 'error');
                }
            }
        }

        function handleReferrerInput(value) {
            const container = document.getElementById('referrerSuggestions');
            if (!value || value.trim().length === 0) {
                container.innerHTML = '';
                container.classList.add('hidden');
                return;
            }
            const matches = allMembersData.filter(m => m.nome.toLowerCase().includes(value.toLowerCase()));
            if (matches.length > 0) {
                container.innerHTML = matches.map(m => `
                    <div onclick="selectReferrer('${m.nome.replace(/'/g, "\\'")}')" 
                         class="px-4 py-2 flex items-center gap-3 text-sm text-white hover:bg-red-500 cursor-pointer border-b border-border-dark last:border-0">
                        <img src="${m.foto}" class="size-6 rounded-full border border-border-dark shrink-0 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m.nome)}'">
                        <span class="truncate">${m.nome}</span>
                    </div>
                `).join('');
                container.classList.remove('hidden');
            } else {
                container.innerHTML = '<div class="px-4 py-3 text-xs text-text-muted italic flex items-center gap-2"><span class="material-symbols-outlined text-sm">person_off</span>Nenhum aluno encontrado</div>';
                container.classList.remove('hidden');
            }
        }

        function selectReferrer(name) {
            document.getElementById('memberReferrer').value = name;
            document.getElementById('referrerSuggestions').classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#memberReferrer')) {
                const sugg = document.getElementById('referrerSuggestions');
                if (sugg) sugg.classList.add('hidden');
            }
        });

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const action = document.getElementById('formAction').value;
            const id = document.getElementById('memberId')?.value;

            const payload = {
                nome_completo: document.getElementById('memberName').value,
                email: document.getElementById('memberEmail').value,
                telefone: document.getElementById('memberPhone').value,
                cpf: document.getElementById('memberCPF').value,
                foto_url: document.getElementById('memberPhoto').value,
                status: document.getElementById('memberStatus').value,
                endereco: document.getElementById('memberAddress').value,
                bairro: document.getElementById('memberNeighborhood').value,
                cidade: document.getElementById('memberCity').value,
                indicado_por: document.getElementById('memberReferrer').value,
                plano: document.getElementById('memberPlan').value,
                data_nascimento: document.getElementById('memberBirth').value,
                campanha: document.getElementById('memberCampaign').value
            };

            try {
                await PlayFitnessAPI.students.save(id, payload);
                closeModal();
                showToast(action === 'register' ? 'Matrícula realizada!' : 'Cadastro atualizado!', 'check_circle');
                loadMembers();
            } catch (err) {
                console.error(err);
                showToast('Erro ao salvar no banco', 'error');
            }
        }

        // DRAG & DROP HANDLERS
        function handleDragStart(e, id) {
            e.dataTransfer.setData('text/plain', id);
            e.currentTarget.classList.add('opacity-40');
            setTimeout(() => e.target.classList.add('invisible'), 0);
        }

        document.addEventListener('dragend', (e) => {
            if (e.target.classList && e.target.classList.contains('invisible')) {
                e.target.classList.remove('invisible', 'opacity-40');
            }
            document.querySelectorAll('.kanban-column').forEach(col => {
                col.classList.remove('bg-surface-dark/50', 'border-red-500/40', 'scale-[1.01]');
            });
        });

        function handleDragOver(e) {
            e.preventDefault();
            const col = e.currentTarget.closest('.kanban-column');
            if (col) {
                col.classList.add('bg-surface-dark/50', 'border-red-500/40', 'scale-[1.01]');
            }
        }

        let waWindow = null;
        let headerShell = null;
        let footerShell = null;
        let glueInterval = null;

        function openPlayFitnessMessenger(id, name, phone, score) {
            // 1. Mensagem IA
            let msg = score <= 40
                ? `Oi ${name}, aqui é do CT Olimpo! Notamos que seu score de engajamento caiu. Faz falta ver você treinando! Vamos agendar uma aula experimental de uma nova modalidade para te motivar?`
                : score < 70
                    ? `Olá ${name}! Passando para desejar um ótimo treino. O PlayFitness detectou que você está com uma frequência média. Quer algum ajuste no plano?`
                    : `Show de bola, ${name}! Seu engajamento está TOP! Ganhou um upgrade de convidado para trazer um amigo esta semana. Bora?`;

            // 2. ENGENHARIA DE MOLDURA "TRÍPLICE"
            const w = 440;
            const h = window.innerHeight * 0.85;
            const x = window.screen.width - w - 24;
            const y = window.screen.height - h - 100;

            const cleanPhone = phone.replace(/\D/g, '');
            const encodedMsg = encodeURIComponent(msg);
            const waUrl = `https://web.whatsapp.com/send?phone=${cleanPhone || '55'}&text=${encodedMsg}`;

            // a) Abrir WhatsApp (Middle)
            waWindow = window.open(waUrl, 'PlayFitnessWA', `width=${w},height=${h},left=${x},top=${y},status=no,toolbar=no`);

            // b) Abrir Peças da Moldura (Top & Bottom Popups)
            // Estas janelas por serem pequenas e focadas pelo código, simulam estar "sobre" o navegador
            headerShell = window.open('shell_header.html', 'PlayFitnessHeader', `width=${w},height=65,left=${x},top=${y - 65},status=no,toolbar=no`);
            footerShell = window.open('shell_footer.html', 'PlayFitnessFooter', `width=${w},height=160,left=${x},top=${y + h},status=no,toolbar=no`);

            if (waWindow) {
                showToast(`Docking Quantum: HUD Ativado`, 'dock_to_bottom');

                // MONITOR DE SINCRONIA (GLUE)
                if (glueInterval) clearInterval(glueInterval);
                glueInterval = setInterval(() => {
                    if (waWindow.closed) {
                        if (headerShell) headerShell.close();
                        if (footerShell) footerShell.close();
                        clearInterval(glueInterval);
                    } else {
                        // Traz as molduras para frente se o usuário clicar na plataforma
                        // Isso mantém o visual de cockpit sempre visível
                        // headerShell.focus();
                        // footerShell.focus();
                    }
                }, 2000);
            }
        }

        function closeMessenger() {
            if (waWindow) waWindow.close();
            if (headerShell) headerShell.close();
            if (footerShell) footerShell.close();
            if (glueInterval) {
                clearInterval(glueInterval);
                glueInterval = null;
            }
        }

        async function handleDrop(e, newStatus) {
            e.preventDefault();
            const col = e.currentTarget.closest('.kanban-column');
            if (col) {
                col.classList.remove('bg-surface-dark/50', 'border-red-500/40', 'scale-[1.01]');
            }

            const id = e.dataTransfer.getData('text/plain');
            if (!id) return;

            try {
                // Feedback visual imediato
                const card = document.getElementById(`member-${id}`);
                const targetContainer = col.querySelector('.cards-container');
                if (card && targetContainer) {
                    targetContainer.appendChild(card);
                    card.classList.remove('invisible', 'opacity-40');
                    card.classList.add('animate-pulse');
                    setTimeout(() => card.classList.remove('animate-pulse'), 500);
                }

                // Update no banco
                await PlayFitnessAPI.students.save(id, { status: newStatus });
                showToast(`Status atualizado: ${newStatus}`, 'sync_saved_locally');

                // Recarrega contadores
                loadMembers();
            } catch (err) {
                console.error(err);
                showToast('Erro ao sincronizar status', 'error');
                loadMembers(); // Reverte UI
            }
        }

        // Inicializar UI Global
        document.addEventListener('DOMContentLoaded', () => {
            PlayFitnessUI.initHeader('membros');
        });

        const showToast = (msg, icon) => PlayFitnessUI.toast(msg, icon);

        document.addEventListener('DOMContentLoaded', loadMembers);
    </script>
</body>

</html>
